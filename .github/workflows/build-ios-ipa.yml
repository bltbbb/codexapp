name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ipa:
    runs-on: macos-latest
    env:
      IOS_PROJECT_DIR: ios-app
      IOS_PROJECT_NAME: CodexRemote
      IOS_SCHEME: CodexRemote
      IOS_APP_NAME: CodexRemote

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 选择 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 安装 XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: 生成 Xcode 工程
        shell: bash
        run: |
          cd "$IOS_PROJECT_DIR"
          xcodegen generate

      - name: 编译 unsigned iOS App
        shell: bash
        run: |
          LOG_PATH="$RUNNER_TEMP/xcodebuild.log"
          RESULT_BUNDLE_PATH="$RUNNER_TEMP/CodexRemote.xcresult"
          : > "$LOG_PATH"
          set -o pipefail
          xcodebuild \
            -project "$IOS_PROJECT_DIR/$IOS_PROJECT_NAME.xcodeproj" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENTITLEMENTS_REQUIRED=NO \
            build 2>&1 | tee "$LOG_PATH"

      - name: 输出失败日志尾部
        if: failure()
        shell: bash
        run: |
          echo "===== xcodebuild.log tail ====="
          tail -n 200 "$RUNNER_TEMP/xcodebuild.log" || true
          echo "===== end ====="

      - name: 提取编译错误摘要
        if: failure()
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib

          log_path = pathlib.Path(r"${RUNNER_TEMP}/xcodebuild.log")
          if not log_path.exists():
              print("xcodebuild.log 不存在")
              raise SystemExit(0)

          lines = log_path.read_text(encoding="utf-8", errors="ignore").splitlines()
          error_indexes = [
              index for index, line in enumerate(lines)
              if " error: " in line or line.strip().startswith("error:")
          ]

          if not error_indexes:
              print("未在日志中找到带 error: 的行")
              raise SystemExit(0)

          print("===== extracted compile errors =====")
          printed = 0
          seen = set()
          for index in error_indexes:
              start = max(0, index - 4)
              end = min(len(lines), index + 8)
              block_key = (start, end)
              if block_key in seen:
                  continue
              seen.add(block_key)
              print(f"----- block {printed + 1} -----")
              for line_no in range(start, end):
                  print(f"{line_no + 1}: {lines[line_no]}")
              printed += 1
              if printed >= 12:
                  break
          print("===== end extracted compile errors =====")
          PY

      - name: 封装 unsigned IPA
        shell: bash
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/$IOS_APP_NAME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "未找到编译产物: $APP_PATH"
            exit 1
          fi

          PACKAGE_DIR="$RUNNER_TEMP/unsigned-ipa"
          PAYLOAD_DIR="$PACKAGE_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/$IOS_APP_NAME.app"

          cd "$PACKAGE_DIR"
          /usr/bin/zip -qry "$RUNNER_TEMP/$IOS_APP_NAME-unsigned.ipa" Payload

      - name: 上传 unsigned IPA 制品
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CodexRemote-unsigned-ipa
          path: |
            ${{ runner.temp }}/CodexRemote-unsigned.ipa
            ${{ runner.temp }}/DerivedData/Build/Products/Release-iphoneos/CodexRemote.app

      - name: 上传构建日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CodexRemote-build-log
          path: |
            ${{ runner.temp }}/xcodebuild.log
            ${{ runner.temp }}/CodexRemote.xcresult
