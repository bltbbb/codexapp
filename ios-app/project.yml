name: CodexRemote
options:
  minimumXcodeGenVersion: 2.38.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  CodexRemote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodexRemote
    settings:
      base:
        PRODUCT_NAME: CodexRemote
        PRODUCT_BUNDLE_IDENTIFIER: com.example.codexremote
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CodexRemote
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIBackgroundModes:
          - remote-notification
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: CodexRemote/CodexRemote.entitlements
schemes:
  CodexRemote:
    build:
      targets:
        CodexRemote: all
    run:
      config: Debug
    archive:
      config: Release
